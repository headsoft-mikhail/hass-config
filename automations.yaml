# oasis
- id: '0025'
  alias: oasis_set_target_temperature
  description: Установить целевую температуру приточной установки
  mode: restart
  triggers:
    - trigger: state
      entity_id: input_number.oasis_target_temperature
  conditions:
    - condition: template
      value_template: >
        {% set val_x_2 = states('input_number.oasis_target_temperature') | float(0) * 2 %}
        {{ val_x_2 | round(0) | int == val_x_2}}
    - condition: template
      value_template: >
        {% set val = states('input_number.oasis_target_temperature') | float(0) %}
        {{ val >= 15 and val <= 30 }}
    - condition: template
      value_template: >
        {% set input_val_x_10 = (states('input_number.oasis_target_temperature') | float(0) * 10) | round(0) %}
        {% set sensor_val_x_10 = (states('sensor.oasis_target_temperature') | float(0)  * 10) | round(0) %}
        {{ input_val_x_10 != sensor_val_x_10 }}
    - condition: numeric_state
      entity_id: input_number.oasis_write_register_counter
      below: 20
  actions:
    - delay: 
        seconds: 2
    - action: modbus.write_register
      data:
        hub: oasis
        unit: 1
        address: 31   # map32
        value: >
          {{ (states('input_number.oasis_target_temperature') | float * 10) | round(0) | int }}
    - action: input_number.increment
      target:
        entity_id: input_number.oasis_write_register_counter
- id: '0026'
  alias: oasis_sync_temperature_from_sensor_to_input_number
  description: Синхронизация температуры в input_number
  mode: single
  triggers:
    - trigger: state
      entity_id: sensor.oasis_target_temperature
  condition:
    - condition: template
      value_template: >
        {% set val_x_2 = states('sensor.oasis_target_temperature') | float(0) * 2 %}
        {{ val_x_2 | round(0) | int == val_x_2}}
    - condition: template
      value_template: >
        {% set val = states('sensor.oasis_target_temperature') | float(0) %}
        {{ val >= 15 and val <= 30 }}
    - condition: template
      value_template: >
        {% set input_val = (states('input_number.oasis_target_temperature') | float(0) * 10) | round(0) %}
        {% set sensor_val = (states('sensor.oasis_target_temperature') | float(0) * 10) | round(0)  %}
        {{ input_val != sensor_val }}
  actions:
    - action: input_number.set_value
      target:
        entity_id: input_number.oasis_target_temperature
      data:
        value: >
          {{ states('sensor.oasis_target_temperature') | float }}
- id: '0027'
  alias: oasis_set_target_fan_speed
  description: Установить целевую скорость вентиляторов приточной установки
  mode: restart
  triggers:
    - trigger: state
      entity_id: input_number.oasis_target_fan_speed
  conditions:
    - condition: template
      value_template: >
        {% set val = states('input_number.oasis_target_fan_speed') | float(0) %}
        {{ val | round(0) | int == val }}
    - condition: template
      value_template: >
        {% set val = states('input_number.oasis_target_fan_speed') | int(0) %}
        {{ val >= 1 and val <= 10 }}
    - condition: template
      value_template: >
        {% set input_val = states('input_number.oasis_target_fan_speed') | int(0) %}
        {% set sensor_val = states('sensor.oasis_target_fan_speed') | int(0) %}
        {{ input_val != sensor_val }}
    - condition: numeric_state
      entity_id: input_number.oasis_write_register_counter
      below: 20
  action:
    - delay: 
        seconds: 2
    - action: modbus.write_register
      data:
        hub: oasis
        unit: 1
        address: 32   # map33
        value: >
          {{ states('input_number.oasis_target_fan_speed') | int }}
    - action: input_number.increment
      target:
        entity_id: input_number.oasis_write_register_counter
- id: '0028'
  alias: oasis_sync_fan_speed_from_sensor_to_input_number
  description: Синхронизация скорости вентилятора в input_number
  mode: single
  triggers:
    - trigger: state
      entity_id: sensor.oasis_target_fan_speed
  conditions:
    - condition: template
      value_template: >
        {% set val = states('sensor.oasis_target_fan_speed') | float(0) %}
        {{ val | round(0) | int == val }}
    - condition: template
      value_template: >
        {% set val = states('sensor.oasis_target_fan_speed') | int(0) %}
        {{ val >= 1 and val <= 10 }}
    - condition: template
      value_template: >
        {% set input_val = states('input_number.oasis_target_fan_speed') | int(0) %}
        {% set sensor_val = states('sensor.oasis_target_fan_speed') | int(0) %}
        {{ input_val != sensor_val }}
  actions:
    - action: input_number.set_value
      target:
        entity_id: input_number.oasis_target_fan_speed
      data:
        value: >
          {{ states('sensor.oasis_target_fan_speed') | int }}
- id: '0029'
  alias: reset_oasis_write_registers_counter
  triggers:
    - trigger: time_pattern
      minutes: "0"
  actions:
    - action: input_number.set_value
      target:
        entity_id: input_number.oasis_write_register_counter
      data:
        value: 0
- id: '0030'
  alias: oasis_confirmed_sync_switch_and_cancel_applying
  description: Синхронизация switch c сенсором скорости и сброс таймера на применение режима
  mode: single
  triggers:
    - trigger: state
      entity_id: binary_sensor.oasis_power_state_confirmed
  variables: 
    target: "{{ 'on' if  is_state('binary_sensor.oasis_power_state_confirmed', 'on') else 'off' }}"
  actions:
    - action: 'switch.turn_{{ target }}'
      target:
        entity_id: switch.oasis_power
    - action: climate.set_hvac_mode
      target: 
        entity_id: climate.oasis 
      data:
        hvac_mode: '{{ "heat" if target=="on" else "off" }}'
    - action: timer.cancel
      target:
        entity_id: timer.oasis_state_applying
- id: '0031'
  alias: oasis_confirmed_sync_switch_after_start
  description: Синхронизация switch после запуска Homeassistant
  triggers:
  - trigger: homeassistant
    event: start
  variables:
    target: "{{ 'on' if  is_state('binary_sensor.oasis_power_state_confirmed', 'on') else 'off' }}"
  actions:
    - action: timer.start
      target:
        entity_id: timer.oasis_state_applying
    - delay:
        seconds: 120
    - action: 'switch.turn_{{ target }}'
      target:
        entity_id: switch.oasis_power
    - action: timer.cancel
      target:
        entity_id: timer.oasis_state_applying
    - action: climate.set_hvac_mode
      target: 
        entity_id: climate.oasis 
      data:
        hvac_mode: '{{ "heat" if target=="on" else "off" }}'
  mode: single
- id: '0032'
  alias: oasis_climate_set_temperature
  mode: restart
  triggers:
    - trigger: state
      entity_id: climate.oasis
      attribute: temperature
  conditions:
    - condition: template
      value_template: >
        {% set val_x_2 = state_attr('climate.oasis', 'temperature') | float(0) * 2 %}
        {{ val_x_2 | round(0) | int == val_x_2}}
    - condition: template
      value_template: >
        {% set val = state_attr('climate.oasis', 'temperature') | float(0) %}
        {{ val >= 15 and val <= 30 }}
    - condition: template
      value_template: >
        {% set climate_val = state_attr('climate.oasis', 'temperature') | float(0)  %}
        {% set sensor_val = states('sensor.oasis_target_temperature') | float(0) %}
        {% set input_val = states('input_number.oasis_target_temperature') | float(0) %}
        {{ climate_val != sensor_val and sensor_val == input_val }}
  actions:
    - action: input_number.set_value
      target:
        entity_id: input_number.oasis_target_temperature
      data:
        value: "{{ state_attr('climate.oasis', 'temperature') | float }}"
- id: '0033'
  alias: oasis_sync_temperature_from_sensor_to_climate
  description: Синхронизация температуры в climate
  mode: single
  triggers:
    - trigger: state
      entity_id: sensor.oasis_target_temperature
  condition:
    - condition: template
      value_template: >
        {% set val_x_2 = states('sensor.oasis_target_temperature') | float(0) * 2 %}
        {{ val_x_2 | round(0) | int == val_x_2}}
    - condition: template
      value_template: >
        {% set val = states('sensor.oasis_target_temperature') | float(0) %}
        {{ val >= 15 and val <= 30 }}
    - condition: template
      value_template: >
        {% set climate_val = (state_attr('cliamte.oasis', 'temperature') | float(0) * 10) | round(0) %}
        {% set sensor_val = (states('sensor.oasis_target_temperature') | float(0) * 10) | round(0)  %}
        {{ climate_val != sensor_val }}
  actions:
    - action: climate.set_temperature
      target: 
        entity_id: climate.oasis 
      data:
        temperature: '{{ states("input_number.oasis_target_temperature") | float }}'
